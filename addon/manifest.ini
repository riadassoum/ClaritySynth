name = claritySynth
summary = "ClaritySynth — Neural Arabic & English Speech Synthesizer"
description = """ClaritySynth is a bilingual (Arabic and English) speech synthesizer for NVDA, featuring natural neural voices, automatic Arabic diacritization (tashkeel), tajweed-aware Arabic phonology, and automatic language switching within a single sentence.

It provides four neural Arabic voices and a neural English voice, with all speech controls (rate, pitch, inflection, volume) normalized so both languages behave identically. Speed is delivered by pitch-preserving, glitch-free time-compression, so voices can be sped up well beyond the usual range without dropping or slurring phonemes, and with negligible latency. A separate lightweight formant-only synthesizer (ClaritySynth Formant) is also included for a tiny, always-available voice.

Numbers are spoken as Arabic words in Arabic context, English words in English context; already-diacritized text is preserved as written; and undiacritized Arabic is automatically vocalized by a neural model with a large statistical fallback."""
author = "Riad Assoum"
url = https://github.com/riadassoum/claritySynth
