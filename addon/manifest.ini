name = claritySynth
summary = "ClaritySynth — Neural Multilingual Speech Synthesizer (Arabic-first)"
description = """ClaritySynth is a neural speech synthesizer for NVDA, built Arabic-first and multilingual. It provides natural neural Arabic voices with automatic diacritization (tashkeel), tajweed-aware Arabic phonology, and automatic language switching within a single sentence, plus neural voices for English and — through downloadable Piper voice packs — many other languages and dialects.

Voices are organised as a Primary (Arabic) voice and a Secondary (non-Arabic) voice, each with a quality/speed variant selector. Downloadable content (extra Arabic acoustic models, vocoders, tashkeel libraries, and Piper voices including the fast real-time streaming variants) can be installed from a downloads window under the Tools menu; the add-on also checks GitHub for updates and shows the changelog. All speech controls (rate, pitch, inflection, volume) are normalized so every language behaves identically, and speed is delivered by pitch-preserving, glitch-free time-compression with negligible latency.

Numbers are spoken as Arabic words in Arabic context and English words in English context; already-diacritized text is preserved as written; undiacritized Arabic is automatically vocalized by a neural model with a large statistical fallback. A separate lightweight formant-only synthesizer (ClaritySynth Formant) is also included as a tiny, always-available voice. The interface is fully translatable and ships with an Arabic translation."""
author = "Riad Assoum"
url = https://github.com/riadassoum/claritySynth
version = 2.0.2
